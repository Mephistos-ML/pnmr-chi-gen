name: Semantic Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    environment: pypi

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Lock checkout to workflow SHA
        run: git reset --hard ${{ github.sha }}

      - name: Run semantic release
        id: semantic_release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          git_committer_name: github-actions
          git_committer_email: actions@users.noreply.github.com

      - name: Prepare release checkout
        if: steps.semantic_release.outputs.released == 'true'
        run: git checkout --force ${{ steps.semantic_release.outputs.commit_sha }}

      - name: Set up Python
        if: steps.semantic_release.outputs.released == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        if: steps.semantic_release.outputs.released == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Rebuild distribution artifacts
        if: steps.semantic_release.outputs.released == 'true'
        run: |
          rm -rf dist
          python -m build --sdist --wheel --outdir dist .

      - name: Check distribution artifacts
        if: steps.semantic_release.outputs.released == 'true'
        run: python -m twine check dist/*

      - name: Publish to PyPI
        if: steps.semantic_release.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
